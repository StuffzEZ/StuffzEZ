name: Update README Stats

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours
  push:
    branches: [main, master]
  workflow_dispatch:          # Allows manual trigger

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Generate README stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          cat << 'EOF' > generate-stats.mjs
          import { Octokit } from "@octokit/rest";

          const octokit = new Octokit({ auth: process.env.GITHUB_TOKEN });
          const username = process.env.GITHUB_USERNAME;

          // ── Helpers ──────────────────────────────────────────────────────────────

          function pad(n) { return String(n).padStart(2, "0"); }

          function formatDate(iso) {
            const d = new Date(iso);
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
          }

          function daysAgo(iso) {
            return Math.floor((Date.now() - new Date(iso)) / 86_400_000);
          }

          function langBar(languages) {
            const total = Object.values(languages).reduce((a, b) => a + b, 0);
            if (!total) return "N/A";
            return Object.entries(languages)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5)
              .map(([lang, bytes]) => {
                const pct = ((bytes / total) * 100).toFixed(1);
                return `\`${lang}\` ${pct}%`;
              })
              .join(" · ");
          }

          function stars(n) {
            return n > 0 ? ` ⭐ ${n}` : "";
          }

          // ── Fetch all non-fork repos ──────────────────────────────────────────────

          async function fetchRepos() {
            const repos = await octokit.paginate(octokit.repos.listForAuthenticatedUser, {
              visibility: "public",
              affiliation: "owner",
              sort: "pushed",
              per_page: 100,
            });
            return repos.filter(r => !r.fork);
          }

          // ── Fetch language breakdown per repo ────────────────────────────────────

          async function fetchLanguages(owner, repo) {
            try {
              const { data } = await octokit.repos.listLanguages({ owner, repo });
              return data;
            } catch { return {}; }
          }

          // ── Count total commits across all repos ─────────────────────────────────

          async function countTotalCommits(repos) {
            let total = 0;
            for (const repo of repos) {
              try {
                const res = await octokit.request("GET /repos/{owner}/{repo}/commits", {
                  owner: username,
                  repo: repo.name,
                  author: username,
                  per_page: 1,
                });
                // Extract total from Link header
                const link = res.headers.link || "";
                const match = link.match(/page=(\d+)>; rel="last"/);
                total += match ? parseInt(match[1]) : res.data.length;
              } catch { /* skip */ }
            }
            return total;
          }

          // ── Fetch open issues authored by user ───────────────────────────────────

          async function fetchIssues() {
            const issues = await octokit.paginate(octokit.issues.listForAuthenticatedUser, {
              filter: "created",
              state: "open",
              per_page: 100,
            });
            return issues.filter(i => !i.pull_request);
          }

          // ── Fetch open PRs authored by user ──────────────────────────────────────

          async function fetchPRs() {
            const { data } = await octokit.search.issuesAndPullRequests({
              q: `author:${username} type:pr state:open`,
              per_page: 20,
            });
            return data.items;
          }

          // ── Fetch organisations ───────────────────────────────────────────────────

          async function fetchOrgs() {
            const { data } = await octokit.orgs.listForAuthenticatedUser({ per_page: 100 });
            return data;
          }

          // ── Fetch user profile ────────────────────────────────────────────────────

          async function fetchUser() {
            const { data } = await octokit.users.getAuthenticated();
            return data;
          }

          // ── Fetch recent activity (last 10 events) ────────────────────────────────

          async function fetchActivity() {
            const { data } = await octokit.activity.listPublicEventsForUser({
              username,
              per_page: 10,
            });
            return data;
          }

          // ── Build Markdown sections ───────────────────────────────────────────────

          function buildProjectsTable(repos, languages) {
            const rows = repos.slice(0, 10).map(r => {
              const langs = langBar(languages[r.name] || {});
              const updated = formatDate(r.pushed_at);
              const desc = (r.description || "—").replace(/\|/g, "\\|").slice(0, 60);
              return `| [**${r.name}**](${r.html_url})${stars(r.stargazers_count)} | ${desc} | ${langs} | ${updated} |`;
            });

            return [
              "### 📦 Recent Projects",
              "",
              "| Repository | Description | Languages | Last Push |",
              "|------------|-------------|-----------|-----------|",
              ...rows,
              "",
            ].join("\n");
          }

          function buildStatsTable(user, totalCommits, repos, issues, prs, orgs) {
            const totalStars = repos.reduce((s, r) => s + r.stargazers_count, 0);
            const totalForks = repos.reduce((s, r) => s + r.forks_count, 0);
            const now = new Date().toUTCString();

            return [
              "### 📊 GitHub Stats",
              "",
              "| Metric | Value |",
              "|--------|-------|",
              `| 🗂️ Public Repos | **${user.public_repos}** |`,
              `| ⭐ Total Stars Earned | **${totalStars}** |`,
              `| 🍴 Total Forks | **${totalForks}** |`,
              `| 💬 Commits (owned repos) | **${totalCommits}+** |`,
              `| 🐛 Open Issues Created | **${issues.length}** |`,
              `| 🔀 Open Pull Requests | **${prs.length}** |`,
              `| 🏢 Organisations | **${orgs.length}** |`,
              `| 👥 Followers | **${user.followers}** |`,
              `| 👤 Following | **${user.following}** |`,
              `| 📅 Member Since | **${formatDate(user.created_at)}** |`,
              `| 🕒 Last Updated | *${now}* |`,
              "",
            ].join("\n");
          }

          function buildOrgsSection(orgs) {
            if (!orgs.length) return "";
            const badges = orgs
              .map(o => `[![${o.login}](${o.avatar_url}&s=40)](https://github.com/${o.login})`)
              .join(" ");
            return [
              "### 🏢 Organisations",
              "",
              badges,
              "",
            ].join("\n");
          }

          function buildIssuesSection(issues) {
            if (!issues.length) return "### 🐛 Open Issues\n\n*No open issues.*\n\n";
            const rows = issues.slice(0, 8).map(i => {
              const repo = i.repository_url.replace("https://api.github.com/repos/", "");
              const age = daysAgo(i.created_at);
              const title = i.title.replace(/\|/g, "\\|").slice(0, 60);
              return `| [${title}](${i.html_url}) | \`${repo}\` | ${age}d ago |`;
            });
            return [
              "### 🐛 Open Issues",
              "",
              "| Title | Repository | Age |",
              "|-------|------------|-----|",
              ...rows,
              "",
            ].join("\n");
          }

          function buildPRsSection(prs) {
            if (!prs.length) return "### 🔀 Open Pull Requests\n\n*No open PRs.*\n\n";
            const rows = prs.slice(0, 8).map(pr => {
              const repo = pr.repository_url.replace("https://api.github.com/repos/", "");
              const age = daysAgo(pr.created_at);
              const title = pr.title.replace(/\|/g, "\\|").slice(0, 60);
              return `| [${title}](${pr.html_url}) | \`${repo}\` | ${age}d ago |`;
            });
            return [
              "### 🔀 Open Pull Requests",
              "",
              "| Title | Repository | Age |",
              "|-------|------------|-----|",
              ...rows,
              "",
            ].join("\n");
          }

          function buildActivitySection(events) {
            const descriptions = {
              PushEvent:            e => `🔨 Pushed to \`${e.repo.name}\``,
              CreateEvent:          e => `✨ Created ${e.payload.ref_type} in \`${e.repo.name}\``,
              IssuesEvent:          e => `🐛 ${e.payload.action} issue in \`${e.repo.name}\``,
              PullRequestEvent:     e => `🔀 ${e.payload.action} PR in \`${e.repo.name}\``,
              WatchEvent:           e => `⭐ Starred \`${e.repo.name}\``,
              ForkEvent:            e => `🍴 Forked \`${e.repo.name}\``,
              IssueCommentEvent:    e => `💬 Commented in \`${e.repo.name}\``,
              ReleaseEvent:         e => `🚀 Released in \`${e.repo.name}\``,
              DeleteEvent:          e => `🗑️ Deleted ${e.payload.ref_type} in \`${e.repo.name}\``,
            };

            const lines = events
              .filter(e => descriptions[e.type])
              .slice(0, 8)
              .map(e => `- ${descriptions[e.type](e)} — *${formatDate(e.created_at)}*`);

            return [
              "### ⚡ Recent Activity",
              "",
              ...lines,
              "",
            ].join("\n");
          }

          // ── Inject into README ────────────────────────────────────────────────────

          import { readFileSync, writeFileSync } from "fs";

          function injectSection(readme, marker, content) {
            const start = `<!-- ${marker}:START -->`;
            const end   = `<!-- ${marker}:END -->`;
            const block = `${start}\n${content}\n${end}`;
            if (readme.includes(start)) {
              return readme.replace(new RegExp(`${start}[\\s\\S]*?${end}`), block);
            }
            return readme + "\n" + block + "\n";
          }

          // ── Main ──────────────────────────────────────────────────────────────────

          async function main() {
            console.log("Fetching GitHub data…");

            const [user, repos, issues, prs, orgs, activity] = await Promise.all([
              fetchUser(),
              fetchRepos(),
              fetchIssues(),
              fetchPRs(),
              fetchOrgs(),
              fetchActivity(),
            ]);

            // Fetch languages in parallel (capped to 15 repos for API budget)
            const langEntries = await Promise.all(
              repos.slice(0, 15).map(async r => [r.name, await fetchLanguages(username, r.name)])
            );
            const languages = Object.fromEntries(langEntries);

            // Commit count is slow — run it too
            const totalCommits = await countTotalCommits(repos.slice(0, 20));

            const readmePath = "README.md";
            let readme = "";
            try { readme = readFileSync(readmePath, "utf8"); }
            catch { readme = `# ${username}\n`; }

            readme = injectSection(readme, "GITHUB_STATS",    buildStatsTable(user, totalCommits, repos, issues, prs, orgs));
            readme = injectSection(readme, "GITHUB_PROJECTS", buildProjectsTable(repos, languages));
            readme = injectSection(readme, "GITHUB_ISSUES",   buildIssuesSection(issues));
            readme = injectSection(readme, "GITHUB_PRS",      buildPRsSection(prs));
            readme = injectSection(readme, "GITHUB_ORGS",     buildOrgsSection(orgs));
            readme = injectSection(readme, "GITHUB_ACTIVITY", buildActivitySection(activity));

            writeFileSync(readmePath, readme, "utf8");
            console.log("README.md updated successfully.");
          }

          main().catch(err => { console.error(err); process.exit(1); });
          EOF
          node generate-stats.mjs

      - name: Commit and push updated README
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-update README stats [skip ci]"
          git push
