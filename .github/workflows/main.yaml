name: Update README Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install @octokit/rest

      - name: Write script
        run: |
          cat << 'SCRIPTEOF' > generate-stats.mjs
          // Auto-generated by stuffzez.github.io/Stats
          // Username: StuffzEZ | Sections: header, stats, projects, activity, issues, prs, orgs
          import { Octokit } from "@octokit/rest";
          import { readFileSync, writeFileSync } from "fs";
          const octokit = new Octokit({ auth: process.env.GH_PAT });
          const username = "StuffzEZ";
          const pad = n => String(n).padStart(2,"0");
          const fmt = iso => { const d=new Date(iso); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
          const daysAgo = iso => Math.floor((Date.now()-new Date(iso))/86400000);
          const LANG_LOGOS = {"JavaScript":"javascript","TypeScript":"typescript","Python":"python","Rust":"rust","Go":"go","C++":"cplusplus","C#":"csharp","Java":"java","Ruby":"ruby","PHP":"php","Swift":"swift","Kotlin":"kotlin","HTML":"html5","CSS":"css3","Shell":"gnubash","Vue":"vuedotjs"};
          function langBadges(langs) { const t=Object.values(langs).reduce((a,b)=>a+b,0); if(!t) return "—"; return Object.entries(langs).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([l])=>`![](https://img.shields.io/badge/-${encodeURIComponent(l)}-05122A?style=flat-square&logo=${LANG_LOGOS[l]||l.toLowerCase()}`).join(" "); }
          async function fetchRepos(){return (await octokit.paginate(octokit.repos.listForUser,{username,type:"owner",sort:"pushed",per_page:100})).filter(r=>!r.fork);}
          async function fetchLanguages(repo){try{const{data}=await octokit.repos.listLanguages({owner:username,repo});return data;}catch{return{};}}
          async function countCommits(repos){let t=0;for(const r of repos){try{const res=await octokit.request("GET /repos/{owner}/{repo}/commits",{owner:username,repo:r.name,author:username,per_page:1});const m=(res.headers.link||"").match(/page=(\d+)>; rel="last"/);t+=m?parseInt(m[1]):res.data.length;}catch{}}return t;}
          async function fetchIssues(){try{return(await octokit.paginate(octokit.issues.listForAuthenticatedUser,{filter:"created",state:"open",per_page:100})).filter(i=>!i.pull_request);}catch{return[];}}
          async function fetchPRs(){try{const{data}=await octokit.search.issuesAndPullRequests({q:`author:${username} type:pr state:open`,per_page:20});return data.items;}catch{return[];}}
          async function fetchOrgs(){try{const{data}=await octokit.orgs.listForAuthenticatedUser({per_page:100});return data;}catch{try{const{data}=await octokit.orgs.listForUser({username,per_page:100});return data;}catch{return[];}}}
          async function fetchUser(){try{const{data}=await octokit.users.getAuthenticated();return data;}catch{const{data}=await octokit.users.getByUsername({username});return data;}}
          async function fetchActivity(){try{const{data}=await octokit.activity.listPublicEventsForUser({username,per_page:15});return data;}catch{return[];}}
          function buildHeader(u){const bio=u.bio?`\n> ${u.bio}\n`:"";const loc=u.location?`📍 **${u.location}**`:"";const blog=u.blog?`🌐 [${u.blog}](${u.blog.startsWith("http")?u.blog:"https://"+u.blog})`:"";const tw=u.twitter_username?`🐦 [@${u.twitter_username}](https://twitter.com/${u.twitter_username})`:"";const links=[loc,blog,tw].filter(Boolean).join(" · ");return `<div align="center">\n\n# 👋 Hi, I'm ${u.name||username}\n${bio}\n${links}\n\n![Profile Views](https://komarev.com/ghpvc/?username=${username}&color=6366f1&style=flat-square&label=Profile+Views) [![Followers](https://img.shields.io/github/followers/${username}?label=Followers&style=flat-square&color=6366f1&logo=github)](https://github.com/${username}?tab=followers)\n\n</div>\n\n---\n`;}
          function buildStats(u,commits,repos,issues,prs,orgs){const stars=repos.reduce((s,r)=>s+r.stargazers_count,0);const forks=repos.reduce((s,r)=>s+r.forks_count,0);const now=new Date().toUTCString();return `## 📊 GitHub Stats\n\n<div align="center">\n\n<img src="https://github-readme-stats.vercel.app/api?username=${username}&show_icons=true&theme=tokyonight&hide_border=true&count_private=true" height="160"/> <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=${username}&layout=compact&theme=tokyonight&hide_border=true&langs_count=6" height="160"/>\n\n<img src="https://github-readme-streak-stats.herokuapp.com/?user=${username}&theme=tokyonight&hide_border=true" height="150"/>\n\n</div>\n\n<div align="center">\n\n![Repos](https://img.shields.io/badge/Repos-${u.public_repos}-6366f1?style=for-the-badge) ![Stars](https://img.shields.io/badge/Stars-${stars}-f59e0b?style=for-the-badge) ![Forks](https://img.shields.io/badge/Forks-${forks}-f97316?style=for-the-badge) ![Commits](https://img.shields.io/badge/Commits-${commits}%2B-22c55e?style=for-the-badge) ![Issues](https://img.shields.io/badge/Issues-${issues.length}-ef4444?style=for-the-badge) ![PRs](https://img.shields.io/badge/PRs-${prs.length}-8b5cf6?style=for-the-badge) ![Orgs](https://img.shields.io/badge/Orgs-${orgs.length}-0ea5e9?style=for-the-badge) ![Followers](https://img.shields.io/badge/Followers-${u.followers}-ec4899?style=for-the-badge)\n\n</div>\n\n<sub>🕒 ${now}</sub>\n\n---\n`;}
          function buildProjects(repos,languages,max=10){const rows=repos.slice(0,max).map(r=>{const l=langBadges(languages[r.name]||{});const d=(r.description||"—").replace(/\|/g,"\\|").slice(0,55);const sb=r.stargazers_count>0?`![](https://img.shields.io/github/stars/${username}/${r.name}?style=flat-square&color=f59e0b&label=⭐)`:"";return `| [**\`${r.name}\`**](${r.html_url}) | ${d} | ${l} | ${sb||"—"} | \`${fmt(r.pushed_at)}\` |`;});return `## 📦 Recent Projects\n\n| Repository | Description | Stack | Stars | Last Push |\n|------------|-------------|:-----:|:-----:|:---------:|\n${rows.join("\n")}\n\n---\n`;}
          function buildActivity(events){const map={PushEvent:e=>`\`📦 Push\` → [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,CreateEvent:e=>`\`✨ Create\` → ${e.payload.ref_type} in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,IssuesEvent:e=>`\`🐛 Issue\` → ${e.payload.action} in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,PullRequestEvent:e=>`\`🔀 PR\` → ${e.payload.action} in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,WatchEvent:e=>`\`⭐ Star\` → [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,ForkEvent:e=>`\`🍴 Fork\` → [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,IssueCommentEvent:e=>`\`💬 Comment\` → [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,ReleaseEvent:e=>`\`🚀 Release\` → [\`${e.repo.name}\`](https://github.com/${e.repo.name})`};const rows=events.filter(e=>map[e.type]).slice(0,8).map(e=>`| ${map[e.type](e)} | \`${fmt(e.created_at)}\` |`);if(!rows.length)return"## ⚡ Recent Activity\n\n*No recent public activity.*\n\n---\n";return `## ⚡ Recent Activity\n\n| Event | Date |\n|-------|:----:|\n${rows.join("\n")}\n\n---\n`;}
          function buildIssues(issues){if(!issues.length)return"## 🐛 Open Issues\n\n![](https://img.shields.io/badge/Open%20Issues-0-brightgreen?style=for-the-badge)\n\n---\n";const rows=issues.slice(0,8).map(i=>{const repo=i.repository_url.replace("https://api.github.com/repos/","");const age=daysAgo(i.created_at);const c=age<7?"brightgreen":age<30?"yellow":"red";return`| [${i.title.replace(/\|/g,"\\|").slice(0,55)}](${i.html_url}) | [\`${repo}\`](https://github.com/${repo}) | ![](https://img.shields.io/badge/${age}d-open-${c}?style=flat-square) |`;});return `## 🐛 Open Issues\n\n| Title | Repository | Age |\n|-------|------------|:---:|\n${rows.join("\n")}\n\n---\n`;}
          function buildPRs(prs){if(!prs.length)return"## 🔀 Open Pull Requests\n\n![](https://img.shields.io/badge/Open%20PRs-0-brightgreen?style=for-the-badge)\n\n---\n";const rows=prs.slice(0,8).map(pr=>{const repo=pr.repository_url.replace("https://api.github.com/repos/","");const age=daysAgo(pr.created_at);return`| [${pr.title.replace(/\|/g,"\\|").slice(0,55)}](${pr.html_url}) | [\`${repo}\`](https://github.com/${repo}) | \`${age}d ago\` |`;});return `## 🔀 Open Pull Requests\n\n| Title | Repository | Age |\n|-------|------------|:---:|\n${rows.join("\n")}\n\n---\n`;}
          function buildOrgs(orgs){if(!orgs.length)return"";const avs=orgs.map(o=>`<a href="https://github.com/${o.login}" title="${o.login}"><img src="${o.avatar_url}&s=60" width="60" height="60" alt="${o.login}" style="border-radius:12px;margin:4px"/></a>`).join("\n");return `## 🏢 Organisations\n\n<div align="center">\n\n${avs}\n\n</div>\n\n---\n`;}
          function inject(readme,marker,content){const s=`<!-- ${marker}:START -->`,e=`<!-- ${marker}:END -->`,block=`${s}\n${content}\n${e}`;return readme.includes(s)?readme.replace(new RegExp(`${s}[\\s\\S]*?${e}`),block):readme+"\n"+block+"\n";}
          async function main(){console.log("⏳ Fetching data...");const[user,repos,issues,prs,orgs,activity]=await Promise.all([fetchUser(),fetchRepos(),fetchIssues(),fetchPRs(),fetchOrgs(),fetchActivity()]);const langEntries=await Promise.all(repos.slice(0,15).map(async r=>[r.name,await fetchLanguages(r.name)]));const languages=Object.fromEntries(langEntries);const totalCommits=await countCommits(repos.slice(0,20));let readme="";try{readme=readFileSync("README.md","utf8");}catch{readme=`# ${username}\n`;}
          readme = inject(readme, "GITHUB_HEADER",   buildHeader(user));
          readme = inject(readme, "GITHUB_STATS",    buildStats(user, totalCommits, repos, issues, prs, orgs));
          readme = inject(readme, "GITHUB_PROJECTS", buildProjects(repos, languages, 10));
          readme = inject(readme, "GITHUB_ACTIVITY", buildActivity(activity));
          readme = inject(readme, "GITHUB_ISSUES",   buildIssues(issues));
          readme = inject(readme, "GITHUB_PRS",       buildPRs(prs));
          readme = inject(readme, "GITHUB_ORGS",      buildOrgs(orgs));
                writeFileSync("README.md",readme,"utf8");console.log("✅ Done.");}
                main().catch(e=>{console.error(e);process.exit(1);});
                SCRIPTEOF
      
            - name: Run script
              env:
                GH_PAT: ${{ secrets.GH_PAT }}
              run: node generate-stats.mjs
      
            - name: Commit & push
              run: |
                git config --local user.email "action@github.com"
                git config --local user.name "GitHub Actions Bot"
                git add README.md
                git diff --staged --quiet || git commit -m "docs: auto-update README stats [skip ci]"
                git push
