name: Update README Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Write script
        run: |
          cat << 'SCRIPTEOF' > generate-stats.mjs
          import { Octokit } from "@octokit/rest";
          import { readFileSync, writeFileSync } from "fs";

          const octokit = new Octokit({ auth: process.env.GH_PAT });
          const username = process.env.GITHUB_USERNAME;

          // ── Helpers ───────────────────────────────────────────────────────────────

          const pad = n => String(n).padStart(2, "0");
          const fmt = iso => { const d = new Date(iso); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
          const daysAgo = iso => Math.floor((Date.now() - new Date(iso)) / 86_400_000);

          // Map language names to shields.io logo names where they differ
          const LANG_LOGOS = {
            "JavaScript": "javascript", "TypeScript": "typescript", "Python": "python",
            "Rust": "rust", "Go": "go", "C++": "cplusplus", "C#": "csharp",
            "Java": "java", "Ruby": "ruby", "PHP": "php", "Swift": "swift",
            "Kotlin": "kotlin", "Dart": "dart", "HTML": "html5", "CSS": "css3",
            "Shell": "gnubash", "Vue": "vuedotjs", "React": "react",
          };

          function langBadges(languages) {
            const total = Object.values(languages).reduce((a, b) => a + b, 0);
            if (!total) return "—";
            return Object.entries(languages)
              .sort((a, b) => b[1] - a[1]).slice(0, 3)
              .map(([lang]) => {
                const logo = LANG_LOGOS[lang] || lang.toLowerCase().replace(/\s/g, "");
                return `![${lang}](https://img.shields.io/badge/-${encodeURIComponent(lang)}-05122A?style=flat-square&logo=${logo})`;
              })
              .join(" ");
          }

          // ── Fetchers ──────────────────────────────────────────────────────────────

          // Uses public list — no special OAuth scope required
          async function fetchRepos() {
            const repos = await octokit.paginate(octokit.repos.listForUser, {
              username, type: "owner", sort: "pushed", per_page: 100,
            });
            return repos.filter(r => !r.fork);
          }

          async function fetchLanguages(repo) {
            try { const { data } = await octokit.repos.listLanguages({ owner: username, repo }); return data; }
            catch { return {}; }
          }

          async function countCommits(repos) {
            let total = 0;
            for (const repo of repos) {
              try {
                const res = await octokit.request("GET /repos/{owner}/{repo}/commits", {
                  owner: username, repo: repo.name, author: username, per_page: 1,
                });
                const match = (res.headers.link || "").match(/page=(\d+)>; rel="last"/);
                total += match ? parseInt(match[1]) : res.data.length;
              } catch { /* skip empty / inaccessible repos */ }
            }
            return total;
          }

          async function fetchIssues() {
            try {
              const all = await octokit.paginate(octokit.issues.listForAuthenticatedUser, {
                filter: "created", state: "open", per_page: 100,
              });
              return all.filter(i => !i.pull_request);
            } catch { return []; }
          }

          async function fetchPRs() {
            try {
              const { data } = await octokit.search.issuesAndPullRequests({
                q: `author:${username} type:pr state:open`, per_page: 20,
              });
              return data.items;
            } catch { return []; }
          }

          async function fetchOrgs() {
            try { const { data } = await octokit.orgs.listForAuthenticatedUser({ per_page: 100 }); return data; }
            catch { const { data } = await octokit.orgs.listForUser({ username, per_page: 100 }); return data; }
          }

          async function fetchUser() {
            try { const { data } = await octokit.users.getAuthenticated(); return data; }
            catch { const { data } = await octokit.users.getByUsername({ username }); return data; }
          }

          async function fetchActivity() {
            try { const { data } = await octokit.activity.listPublicEventsForUser({ username, per_page: 15 }); return data; }
            catch { return []; }
          }

          // ── Section builders ──────────────────────────────────────────────────────

          function buildHeader(user) {
            const bio      = user.bio      ? `\n> ${user.bio}\n`                                                         : "";
            const location = user.location ? `📍 **${user.location}**`                                                  : "";
            const blog     = user.blog     ? `🌐 [Website](${user.blog.startsWith("http") ? user.blog : "https://"+user.blog})` : "";
            const twitter  = user.twitter_username ? `🐦 [@${user.twitter_username}](https://twitter.com/${user.twitter_username})` : "";
            const links    = [location, blog, twitter].filter(Boolean).join(" &nbsp;·&nbsp; ");

            return [
              `<div align="center">`,
              ``,
              `# 👋 Hi, I'm ${user.name || username}`,
              bio,
              links,
              ``,
              `[![Profile Views](https://komarev.com/ghpvc/?username=${username}&color=6366f1&style=flat-square&label=Profile+Views)](https://github.com/${username})`,
              `[![GitHub followers](https://img.shields.io/github/followers/${username}?label=Followers&style=flat-square&color=6366f1&logo=github)](https://github.com/${username}?tab=followers)`,
              `[![GitHub User's stars](https://img.shields.io/github/stars/${username}?affiliations=OWNER&style=flat-square&color=f59e0b&logo=github&label=Total%20Stars)](https://github.com/${username})`,
              ``,
              `</div>`,
              ``,
              `---`,
              ``,
            ].join("\n");
          }

          function buildStats(user, totalCommits, repos, issues, prs, orgs) {
            const totalStars = repos.reduce((s, r) => s + r.stargazers_count, 0);
            const totalForks = repos.reduce((s, r) => s + r.forks_count, 0);
            const now = new Date().toUTCString();

            return [
              `## 📊 GitHub Stats`,
              ``,
              `<div align="center">`,
              ``,
              `<img src="https://github-readme-stats.vercel.app/api?username=${username}&show_icons=true&theme=tokyonight&hide_border=true&count_private=true&include_all_commits=true" height="160"/>`,
              `&nbsp;`,
              `<img src="https://github-readme-stats.vercel.app/api/top-langs/?username=${username}&layout=compact&theme=tokyonight&hide_border=true&langs_count=6" height="160"/>`,
              ``,
              `<img src="https://github-readme-streak-stats.herokuapp.com/?user=${username}&theme=tokyonight&hide_border=true" height="150"/>`,
              ``,
              `</div>`,
              ``,
              `### At a Glance`,
              ``,
              `<div align="center">`,
              ``,
              `![Repos](https://img.shields.io/badge/Public%20Repos-${user.public_repos}-6366f1?style=for-the-badge&logo=github)`,
              `![Stars](https://img.shields.io/badge/Total%20Stars-${totalStars}-f59e0b?style=for-the-badge&logo=star)`,
              `![Forks](https://img.shields.io/badge/Total%20Forks-${totalForks}-f97316?style=for-the-badge&logo=git)`,
              `![Commits](https://img.shields.io/badge/Commits%20(est)-${totalCommits}%2B-22c55e?style=for-the-badge&logo=git)`,
              `![Issues](https://img.shields.io/badge/Open%20Issues-${issues.length}-ef4444?style=for-the-badge&logo=github)`,
              `![PRs](https://img.shields.io/badge/Open%20PRs-${prs.length}-8b5cf6?style=for-the-badge&logo=github)`,
              `![Orgs](https://img.shields.io/badge/Organisations-${orgs.length}-0ea5e9?style=for-the-badge&logo=github)`,
              `![Followers](https://img.shields.io/badge/Followers-${user.followers}-ec4899?style=for-the-badge&logo=github)`,
              ``,
              `</div>`,
              ``,
              `<sub>🕒 Stats last refreshed: ${now}</sub>`,
              ``,
              `---`,
              ``,
            ].join("\n");
          }

          function buildProjects(repos, languages) {
            const rows = repos.slice(0, 10).map(r => {
              const langs  = langBadges(languages[r.name] || {});
              const desc   = (r.description || "—").replace(/\|/g, "\\|").slice(0, 55);
              const star   = r.stargazers_count > 0
                ? `![stars](https://img.shields.io/github/stars/${username}/${r.name}?style=flat-square&color=f59e0b&label=⭐)`
                : "";
              const issues = r.open_issues_count > 0
                ? `![issues](https://img.shields.io/github/issues/${username}/${r.name}?style=flat-square&color=ef4444&label=issues)`
                : "";
              const license = r.license
                ? `![license](https://img.shields.io/github/license/${username}/${r.name}?style=flat-square)`
                : "";
              const badges = [star, issues, license].filter(Boolean).join(" ");
              return `| [**\`${r.name}\`**](${r.html_url}) | ${desc} | ${langs} | ${badges || "—"} | \`${fmt(r.pushed_at)}\` |`;
            });

            return [
              `## 📦 Recent Projects`,
              ``,
              `| Repository | Description | Stack | Badges | Last Push |`,
              `|------------|-------------|:-----:|:------:|:---------:|`,
              ...rows,
              ``,
              `---`,
              ``,
            ].join("\n");
          }

          function buildActivity(events) {
            const map = {
              PushEvent:         e => `\`📦 Push\``,
              CreateEvent:       e => `\`✨ Create\``,
              IssuesEvent:       e => `\`🐛 Issue\``,
              PullRequestEvent:  e => `\`🔀 PR\``,
              WatchEvent:        e => `\`⭐ Star\``,
              ForkEvent:         e => `\`🍴 Fork\``,
              IssueCommentEvent: e => `\`💬 Comment\``,
              ReleaseEvent:      e => `\`🚀 Release\``,
              DeleteEvent:       e => `\`🗑️ Delete\``,
            };

            const desc = {
              PushEvent:         e => `Pushed to [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
              CreateEvent:       e => `Created ${e.payload.ref_type} in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
              IssuesEvent:       e => `${e.payload.action} issue in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
              PullRequestEvent:  e => `${e.payload.action} PR in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
              WatchEvent:        e => `Starred [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
              ForkEvent:         e => `Forked [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
              IssueCommentEvent: e => `Commented in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
              ReleaseEvent:      e => `Published release in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
              DeleteEvent:       e => `Deleted ${e.payload.ref_type} in [\`${e.repo.name}\`](https://github.com/${e.repo.name})`,
            };

            const rows = events
              .filter(e => map[e.type])
              .slice(0, 8)
              .map(e => `| ${map[e.type](e)} | ${desc[e.type](e)} | \`${fmt(e.created_at)}\` |`);

            if (!rows.length) return `## ⚡ Recent Activity\n\n*No recent public activity.*\n\n---\n\n`;

            return [
              `## ⚡ Recent Activity`,
              ``,
              `| Type | Event | Date |`,
              `|:----:|-------|:----:|`,
              ...rows,
              ``,
              `---`,
              ``,
            ].join("\n");
          }

          function buildIssues(issues) {
            if (!issues.length) {
              return `## 🐛 Open Issues\n\n![No Issues](https://img.shields.io/badge/Open%20Issues-0-brightgreen?style=for-the-badge)\n\n---\n\n`;
            }
            const rows = issues.slice(0, 8).map(i => {
              const repo  = i.repository_url.replace("https://api.github.com/repos/", "");
              const age   = daysAgo(i.created_at);
              const title = i.title.replace(/\|/g, "\\|").slice(0, 55);
              const color = age < 7 ? "brightgreen" : age < 30 ? "yellow" : "red";
              const badge = `![${age}d](https://img.shields.io/badge/${age}d-open-${color}?style=flat-square)`;
              return `| [${title}](${i.html_url}) | [\`${repo}\`](https://github.com/${repo}) | ${badge} |`;
            });
            return [
              `## 🐛 Open Issues`,
              ``,
              `| Title | Repository | Age |`,
              `|-------|------------|:---:|`,
              ...rows,
              ``,
              `---`,
              ``,
            ].join("\n");
          }

          function buildPRs(prs) {
            if (!prs.length) {
              return `## 🔀 Open Pull Requests\n\n![No PRs](https://img.shields.io/badge/Open%20PRs-0-brightgreen?style=for-the-badge)\n\n---\n\n`;
            }
            const rows = prs.slice(0, 8).map(pr => {
              const repo  = pr.repository_url.replace("https://api.github.com/repos/", "");
              const age   = daysAgo(pr.created_at);
              const title = pr.title.replace(/\|/g, "\\|").slice(0, 55);
              const color = age < 7 ? "brightgreen" : age < 30 ? "yellow" : "orange";
              return `| [${title}](${pr.html_url}) | [\`${repo}\`](https://github.com/${repo}) | ![${age}d](https://img.shields.io/badge/${age}d-open-${color}?style=flat-square) |`;
            });
            return [
              `## 🔀 Open Pull Requests`,
              ``,
              `| Title | Repository | Age |`,
              `|-------|------------|:---:|`,
              ...rows,
              ``,
              `---`,
              ``,
            ].join("\n");
          }

          function buildOrgs(orgs) {
            if (!orgs.length) return "";
            const avatars = orgs
              .map(o => `<a href="https://github.com/${o.login}" title="${o.login}"><img src="${o.avatar_url}&s=60" width="60" height="60" alt="${o.login}" style="border-radius:12px;margin:6px"/></a>`)
              .join("\n");
            return [
              `## 🏢 Organisations`,
              ``,
              `<div align="center">`,
              ``,
              avatars,
              ``,
              `</div>`,
              ``,
              `---`,
              ``,
            ].join("\n");
          }

          // ── README injection ──────────────────────────────────────────────────────

          function inject(readme, marker, content) {
            const start = `<!-- ${marker}:START -->`;
            const end   = `<!-- ${marker}:END -->`;
            const block = `${start}\n${content}\n${end}`;
            if (readme.includes(start)) {
              return readme.replace(new RegExp(`${start}[\\s\\S]*?${end}`), block);
            }
            return readme + "\n" + block + "\n";
          }

          // ── Main ──────────────────────────────────────────────────────────────────

          async function main() {
            console.log(`⏳ Fetching GitHub data for @${username}…`);

            const [user, repos, issues, prs, orgs, activity] = await Promise.all([
              fetchUser(), fetchRepos(), fetchIssues(), fetchPRs(), fetchOrgs(), fetchActivity(),
            ]);

            console.log(`📦 ${repos.length} repos | 🐛 ${issues.length} issues | 🔀 ${prs.length} PRs | 🏢 ${orgs.length} orgs`);

            const langEntries = await Promise.all(
              repos.slice(0, 15).map(async r => [r.name, await fetchLanguages(r.name)])
            );
            const languages = Object.fromEntries(langEntries);

            const totalCommits = await countCommits(repos.slice(0, 20));
            console.log(`💬 ~${totalCommits} commits counted`);

            let readme = "";
            try { readme = readFileSync("README.md", "utf8"); }
            catch { readme = `# ${username}\n`; }

            readme = inject(readme, "GITHUB_HEADER",   buildHeader(user));
            readme = inject(readme, "GITHUB_STATS",    buildStats(user, totalCommits, repos, issues, prs, orgs));
            readme = inject(readme, "GITHUB_PROJECTS", buildProjects(repos, languages));
            readme = inject(readme, "GITHUB_ACTIVITY", buildActivity(activity));
            readme = inject(readme, "GITHUB_ISSUES",   buildIssues(issues));
            readme = inject(readme, "GITHUB_PRS",      buildPRs(prs));
            readme = inject(readme, "GITHUB_ORGS",     buildOrgs(orgs));

            writeFileSync("README.md", readme, "utf8");
            console.log("✅ README.md updated successfully.");
          }

          main().catch(err => { console.error(err); process.exit(1); });
          SCRIPTEOF

      - name: Run script
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node generate-stats.mjs

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-update README stats [skip ci]"
          git push
